# GoReleaser configuration for ffgo.
# Docs: https://goreleaser.com
version: 2

project_name: ffgo

before:
  hooks:
    - go mod tidy

builds:
  - id: ffgo
    main: .
    binary: ffgo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/arbazkhan971/ffgo/internal/buildinfo.Version={{.Version}}
      - -X github.com/arbazkhan971/ffgo/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/arbazkhan971/ffgo/internal/buildinfo.Date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

homebrew_casks:
  - name: ffgo
    # Publish only when a tap token is configured; otherwise the cask is still
    # generated as a release artifact but not pushed to the tap repo.
    skip_upload: '{{ if eq (envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "") "" }}true{{ else }}false{{ end }}'
    repository:
      owner: arbazkhan971
      name: homebrew-tap
      token: '{{ envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}'
    homepage: https://github.com/arbazkhan971/ffgo
    description: FFmpeg for humans — inspect, convert, compress and edit video with sane commands
    dependencies:
      - formula: ffmpeg
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    # Strip the quarantine flag so the unsigned binary runs without a Gatekeeper prompt.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ffgo"]
          end

scoops:
  - skip_upload: '{{ if eq (envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "") "" }}true{{ else }}false{{ end }}'
    repository:
      owner: arbazkhan971
      name: scoop-bucket
      token: '{{ envOrDefault "HOMEBREW_TAP_GITHUB_TOKEN" "" }}'
    homepage: https://github.com/arbazkhan971/ffgo
    description: FFmpeg for humans — inspect, convert, compress and edit video with sane commands
    license: MIT

nfpms:
  - id: packages
    package_name: ffgo
    homepage: https://github.com/arbazkhan971/ffgo
    description: FFmpeg for humans — inspect, convert, compress and edit video with sane commands
    maintainer: Arbaz Khan <arbaz.khan@lineupx.com>
    license: MIT
    formats: [deb, rpm, apk]
    recommends:
      - ffmpeg

release:
  github:
    owner: arbazkhan971
    name: ffgo
  draft: false
  prerelease: auto
  footer: |
    ---
    Made with ffgo — FFmpeg for humans.
