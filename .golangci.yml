# golangci-lint configuration for ffgo.
run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - revive
    - bodyclose

linters-settings:
  goimports:
    local-prefixes: github.com/arbazkhan971/ffgo
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    # Test files may skip a few checks for brevity.
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
